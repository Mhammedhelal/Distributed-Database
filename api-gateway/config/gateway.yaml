server:
  port: 8000
  read_timeout: 15s
  write_timeout: 15s
  shutdown_timeout: 10s

nodes:
  master:
    id: "master-1"
    address: "http://master:8080"
  workers:
    - id: "worker-1"
      address: "http://worker1:8081"
    - id: "worker-2"
      address: "http://worker2:8082"

auth:
  # Override with GATEWAY_HMAC_SECRET env var — never commit a real secret.
  hmac_secret: "change-me-in-production"
  token_ttl: 30s
  # Optional: set to require external clients to present a bearer token.
  # Override with GATEWAY_CLIENT_API_KEY env var.
  client_api_key: ""

rate_limit:
  requests_per_second: 100
  burst: 200